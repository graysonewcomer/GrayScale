<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GrayScale · Status</title>
  <script>
    // Apply saved theme before first paint to avoid a flash. Shared key with
    // the dashboard so the two pages stay in sync.
    (function () {
      const t = localStorage.getItem('grayscale-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    /* Design tokens mirror the dashboard (index.html). Kept in sync by hand
       for now; a shared stylesheet is a planned later cleanup. */
    :root, [data-theme="dark"] {
      --bg: #0e0f12;
      --panel: #191b1f;
      --panel-2: #14161a;
      --border: #2a2d33;
      --text: #e8e9eb;
      --muted: #8a8f98;
      --accent: #4a9eff;
      --accent-ink: #06121f;
      --green: #3ecf7a;
      --danger: #ff6b6b;
      --input-bg: #0d0e11;
      --code-bg: #0d0e11;
    }
    [data-theme="light"] {
      --bg: #f4f6f9;
      --panel: #ffffff;
      --panel-2: #eceff3;
      --border: #dfe3ea;
      --text: #1b1e24;
      --muted: #697280;
      --accent: #2563eb;
      --accent-ink: #ffffff;
      --green: #16a34a;
      --danger: #dc2626;
      --input-bg: #ffffff;
      --code-bg: #eef1f5;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .app { display: flex; min-height: 100vh; }

    /* ---- Sidebar (matches dashboard) ---- */
    .sidebar {
      width: 244px; flex-shrink: 0;
      background: var(--panel-2); border-right: 1px solid var(--border);
      position: sticky; top: 0; height: 100vh;
      display: flex; flex-direction: column;
    }
    .brand {
      display: flex; align-items: center; gap: 9px;
      padding: 18px 20px 14px; font-size: 18px; font-weight: 700; letter-spacing: 0.3px;
    }
    .brand .dot {
      width: 10px; height: 10px; border-radius: 3px;
      background: linear-gradient(135deg, var(--accent), var(--green));
    }
    .side-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--muted); padding: 6px 22px;
    }
    .nav { flex: 1; overflow-y: auto; padding: 2px 10px 10px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: block; width: 100%; text-align: left;
      color: var(--muted); padding: 8px 12px; border-radius: 8px;
      text-decoration: none; font-size: 13px;
    }
    .nav-item:hover { background: var(--panel); color: var(--text); }
    .nav-item.active {
      background: var(--panel); color: var(--text);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .side-footer { padding: 12px 20px; border-top: 1px solid var(--border); }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted); text-decoration: none; font-size: 12px;
    }
    .back-link:hover { color: var(--accent); }

    /* ---- Main ---- */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 12px;
      padding: 13px 24px; background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .topbar h1 { margin: 0; font-size: 15px; font-weight: 600; }
    .spacer { flex: 1; }
    .theme-toggle {
      width: 34px; height: 34px; flex-shrink: 0;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; font-size: 15px; line-height: 1;
      color: var(--text); display: flex; align-items: center; justify-content: center;
    }
    .theme-toggle:hover { border-color: var(--accent); }

    /* ---- Rendered markdown ---- */
    .md-content {
      max-width: 720px; padding: 30px 32px 60px; line-height: 1.6;
    }
    .md-content h1 { font-size: 24px; margin: 0 0 18px; }
    .md-content h2 { font-size: 18px; margin: 30px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .md-content h3 { font-size: 15px; margin: 22px 0 8px; }
    .md-content p { margin: 10px 0; }
    .md-content ul, .md-content ol { margin: 10px 0; padding-left: 22px; }
    .md-content li { margin: 4px 0; }
    .md-content a { color: var(--accent); }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .md-content code {
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 5px; padding: 1px 5px; font-size: 12.5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .md-content pre {
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; overflow-x: auto;
    }
    .md-content pre code { background: none; border: none; padding: 0; }
    .md-content blockquote {
      margin: 12px 0; padding: 2px 14px; color: var(--muted);
      border-left: 3px solid var(--border);
    }
    .md-content table { border-collapse: collapse; margin: 12px 0; }
    .md-content th, .md-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .md-content th { background: var(--panel-2); }
    .notfound { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><span class="dot"></span>GrayScale</div>
      <div class="side-label">Project</div>
      <nav class="nav">
        {% for f in files %}
        <a class="nav-item {% if f.slug == active %}active{% endif %}"
           href="/status/{{ f.slug }}">{{ f.label }}</a>
        {% endfor %}
      </nav>
      <div class="side-footer">
        <a class="back-link" href="/">&#8592; Back to clips</a>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>{{ label }}</h1>
        <div class="spacer"></div>
        <button class="theme-toggle" title="Toggle light / dark">🌙</button>
      </div>
      <div class="md-content">{{ content | safe }}</div>
    </main>
  </div>

  <script>
    // Light / dark theme toggle (persisted, shared with the dashboard)
    const themeToggle = document.querySelector('.theme-toggle');
    function syncThemeIcon() {
      const dark = document.documentElement.getAttribute('data-theme') !== 'light';
      themeToggle.textContent = dark ? '🌙' : '☀️';
    }
    syncThemeIcon();
    themeToggle.addEventListener('click', () => {
      const dark = document.documentElement.getAttribute('data-theme') !== 'light';
      const next = dark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('grayscale-theme', next);
      syncThemeIcon();
    });
  </script>
</body>
</html>
