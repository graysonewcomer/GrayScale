<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GrayScale · Status</title>
  <script>
    // Apply saved theme before first paint to avoid a flash. Shared key with
    // the dashboard so the two pages stay in sync.
    (function () {
      const t = localStorage.getItem('grayscale-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark"></span><span>Gray<em>Scale</em></span></div>
      <div class="side-label">Project</div>
      <nav class="nav">
        {% for f in files %}
        <a class="nav-item {% if f.slug == active %}active{% endif %}"
           href="/status/{{ f.slug }}">{{ f.label }}</a>
        {% endfor %}
      </nav>
      <div class="side-footer">
        <a class="back-link" href="/">&#8592; Back to clips</a>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>{{ label }}</h1>
        <div class="spacer"></div>
        <button class="theme-toggle" title="Toggle light / dark">&#9822;</button>
      </div>
      <div class="md-content">{{ content | safe }}</div>
    </main>
  </div>

  <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
